<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Comma Chameleon!</title>
<style>
:root {
  --bg: #1a2e1a;
  --card: #1e3a1e;
  --gold: #f5c842;
  --coral: #ff6b6b;
  --mint: #4ecb8d;
  --sky: #5bb8f5;
  --ink: #e8f5e8;
  --soft: #8fa88f;
  --r: 18px;
  /* Chameleon color — changes on correct answers */
  --ch1: #4caf50;   /* main body */
  --ch2: #2e7d32;   /* dark/shadow */
  --ch3: #a5d6a7;   /* belly */
  --ch4: #1b5e20;   /* outline */
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Georgia', serif; background: var(--bg); min-height: 100vh; color: var(--ink); overflow-x: hidden; }

/* ── Stars ── */
.stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.star { position: absolute; border-radius: 50%; background: #90ee90; animation: twinkle ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:.1} 50%{opacity:.6} }

/* ── Main layout ── */
.wrap { position: relative; z-index: 10; max-width: 700px; margin: 0 auto; padding: 0 14px 32px; }

/* ── Header / mascot ── */
.header-area { display: flex; align-items: center; justify-content: center; gap: 0; padding: 18px 0 6px; }
.cham-svg { width: 130px; flex-shrink: 0; }
/* Chameleon SVG color parts — transition for color change */
.ch-body { fill: var(--ch1); transition: fill 0.6s; }
.ch-dark { fill: var(--ch2); transition: fill 0.6s; }
.ch-belly { fill: var(--ch3); transition: fill 0.6s; }
.ch-tail { stroke: var(--ch1); transition: stroke 0.6s; }
.ch-taildark { stroke: var(--ch2); transition: stroke 0.6s; }

.title-block { line-height: 1.1; }
.title-line1 { font-size: clamp(2rem, 7vw, 3rem); font-weight: 900; color: var(--mint); letter-spacing: -1px; }
.title-line1 .comma-char { color: var(--gold); }
.title-line2 { font-size: clamp(1rem, 3.5vw, 1.4rem); font-weight: 900; color: var(--gold); letter-spacing: 1px; }
.subtitle { font-size: .82rem; color: var(--soft); font-style: italic; margin-top: 3px; }

/* ── Score bar ── */
.score-bar { display: flex; justify-content: center; gap: 16px; margin: 10px 0 0; }
.score-pill { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); border-radius: 999px; padding: 5px 18px; font-size: .95rem; font-weight: 700; }

/* ── Card ── */
.card { background: var(--card); border-radius: var(--r); border: 1px solid rgba(255,255,255,.07); padding: clamp(16px,4vw,28px); box-shadow: 0 8px 32px rgba(0,0,0,.4); margin-top: 12px; }

/* ── Progress ── */
.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.progress-bar { flex: 1; height: 9px; background: rgba(255,255,255,.1); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--mint), var(--gold)); border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1); }
.progress-label { font-size: .8rem; color: var(--soft); white-space: nowrap; }

/* ── Instruction ── */
.instruction { text-align: center; font-size: clamp(.85rem,2.8vw,1rem); color: var(--soft); margin-bottom: 14px; font-style: italic; }

/* ── Sentence display ── */
.sentence-wrap {
  display: flex; flex-wrap: wrap; align-items: center;
  justify-content: center; gap: 4px 0;
  min-height: 80px; padding: 12px 4px;
  background: rgba(0,0,0,.2); border-radius: 12px;
  margin-bottom: 16px;
}

.word {
  font-size: clamp(1.1rem, 4vw, 1.5rem);
  font-weight: 700; color: var(--ink);
  padding: 6px 10px; border-radius: 8px;
  background: rgba(255,255,255,.05);
  margin: 3px 0;
  user-select: none; -webkit-user-select: none;
}
.word.flash-correct { animation: wordPop .4s ease; }
.word.flash-wrong   { animation: wordShake .35s ease; }
@keyframes wordPop   { 0%{transform:scale(1)} 50%{transform:scale(1.12)} 100%{transform:scale(1)} }
@keyframes wordShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

/* Comma slot — the interactive gap between words */
.slot {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 44px;
  border: none; background: transparent;
  cursor: pointer; touch-action: manipulation;
  position: relative; flex-shrink: 0;
  border-radius: 8px;
  transition: background .15s;
  margin: 3px 0;
}
.slot:active { background: rgba(255,255,255,.08); }
.slot-inner {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2.5px dashed rgba(143,168,143,.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; font-weight: 900; color: transparent;
  transition: all .2s;
}
.slot.filled .slot-inner {
  border-style: solid; border-color: var(--gold);
  background: rgba(245,200,66,.15);
  color: var(--gold); font-size: 1.6rem;
  line-height: 1;
}
.slot.reveal-correct .slot-inner {
  border-color: var(--mint); background: rgba(78,203,141,.2);
  color: var(--mint);
}
.slot.reveal-wrong .slot-inner {
  border-color: var(--coral); background: rgba(255,107,107,.2);
  color: var(--coral);
}
.slot.should-have .slot-inner {
  border-color: var(--mint); border-style: solid;
  background: rgba(78,203,141,.25); color: var(--mint);
  animation: pulseSlot .5s ease 2;
}
@keyframes pulseSlot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }

/* ── Feedback ── */
.feedback { text-align: center; font-size: 1rem; font-weight: 700; min-height: 36px; padding: 4px 0; }
.feedback.correct { color: var(--mint); }
.feedback.wrong   { color: var(--coral); }

/* ── Check button ── */
.check-btn {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, #4caf50, #2e7d32);
  color: white; border: none; border-radius: 14px;
  font-size: 1.05rem; font-weight: 900; font-family: 'Georgia', serif;
  cursor: pointer; box-shadow: 0 4px 18px rgba(76,175,80,.4);
  transition: all .2s; touch-action: manipulation;
  letter-spacing: .5px;
}
.check-btn:active { transform: scale(.97); }
.check-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.check-btn.next-mode {
  background: linear-gradient(135deg, var(--sky), #1976d2);
  box-shadow: 0 4px 18px rgba(91,184,245,.35);
}

/* ── Celebration ── */
.celebration {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: linear-gradient(135deg, #0d2010, #1a3a1a);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 14px; text-align: center; padding: 32px;
}
.celebration.show { display: flex; }
.celeb-emoji { font-size: clamp(3.5rem,12vw,5.5rem); animation: bounce .6s infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-14px)} }
.final-score { font-size: clamp(3rem,12vw,5rem); font-weight: 900; color: var(--gold); line-height: 1; text-shadow: 0 0 30px rgba(245,200,66,.5); }
.final-sub { font-size: 1.05rem; color: var(--soft); margin-top: -4px; }
.celeb-title { font-size: clamp(1.8rem,6vw,2.8rem); color: var(--ink); font-weight: 900; }
.celeb-msg { font-size: .97rem; color: var(--soft); max-width: 380px; line-height: 1.6; }
.ribbon-wrap { display: none; flex-direction: column; align-items: center; gap: 4px; }
.ribbon-wrap.show { display: flex; }
.ribbon-svg { width: 110px; height: 130px; filter: drop-shadow(0 6px 16px rgba(37,99,235,.5)); animation: rPop .55s cubic-bezier(.4,0,.2,1) both; }
@keyframes rPop { 0%{transform:scale(0) rotate(-15deg)} 70%{transform:scale(1.15) rotate(3deg)} 100%{transform:scale(1) rotate(0)} }
.ribbon-label { font-size: 1.02rem; font-weight: 700; color: #60a5fa; letter-spacing: 1px; }
.play-again {
  padding: 15px 38px; background: linear-gradient(135deg, var(--mint), #1a7a4a);
  color: #0a2a10; border: none; border-radius: 999px;
  font-size: 1.05rem; font-weight: 900; font-family: 'Georgia', serif;
  cursor: pointer; margin-top: 4px; box-shadow: 0 6px 20px rgba(78,203,141,.4);
  touch-action: manipulation;
}
.play-again:active { transform: scale(.97); }

/* ── Confetti ── */
.cf-piece { position: fixed; z-index: 300; pointer-events: none; animation: cffall linear forwards; border-radius: 2px; }
@keyframes cffall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

@media (max-width: 480px) {
  .word { font-size: 1rem; padding: 5px 7px; }
  .slot { width: 28px; }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrap">

<script>

const CHAM_COLORS = [
  { ch1:'#4caf50', ch2:'#2e7d32', ch3:'#a5d6a7' }, // green (default)
  { ch1:'#e91e63', ch2:'#880e4f', ch3:'#f48fb1' }, // pink
  { ch1:'#9c27b0', ch2:'#4a148c', ch3:'#ce93d8' }, // purple
  { ch1:'#2196f3', ch2:'#0d47a1', ch3:'#90caf9' }, // blue
  { ch1:'#ff9800', ch2:'#e65100', ch3:'#ffcc80' }, // orange
  { ch1:'#f44336', ch2:'#b71c1c', ch3:'#ef9a9a' }, // red
  { ch1:'#00bcd4', ch2:'#006064', ch3:'#80deea' }, // teal
  { ch1:'#8bc34a', ch2:'#33691e', ch3:'#dcedc8' }, // lime
];
let colorIdx = 0;

function changeChameleonColor() {
  colorIdx = (colorIdx + 1) % CHAM_COLORS.length;
  const c = CHAM_COLORS[colorIdx];
  const r = document.documentElement.style;
  r.setProperty('--ch1', c.ch1);
  r.setProperty('--ch2', c.ch2);
  r.setProperty('--ch3', c.ch3);
}

// ── GAME STATE ────────────────────────────────────────────────────────────
const GS = 20, RIBBON = 17;
let questions=[], cur=0, correct=0, wrong=0, answered=false, inNextMode=false;

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(){
  questions=shuf([...ALL]).slice(0,GS);
  cur=0;correct=0;wrong=0;
  updateSB();renderQ();
}

function updateSB(){
  document.getElementById('correctCount').textContent=correct;
  document.getElementById('wrongCount').textContent=wrong;
}

function renderQ(){
  answered=false;inNextMode=false;
  const q=questions[cur];
  document.getElementById('progressFill').style.width=(cur/GS*100)+'%';
  document.getElementById('progressLabel').textContent=(cur+1)+' of '+GS;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';

  // Update check button
  const btn=document.getElementById('checkBtn');
  btn.textContent='Check My Answer \u2713';
  btn.className='check-btn';
  btn.disabled=false;

  // Show/hide the 2-comma warning banner
  const numCommas=q.c.length;
  const banner=document.getElementById('commaBanner');
  if(numCommas>1){
    banner.style.display='block';
    document.getElementById('commaCount').textContent=numCommas;
    const words2=['two','three','four'];
    document.getElementById('commaCount2').textContent=words2[numCommas-2]||numCommas;
  } else {
    banner.style.display='none';
  }

  // Build sentence
  const wrap=document.getElementById('sentenceWrap');
  wrap.innerHTML='';
  q.w.forEach((word,i)=>{
    // Slot before first word? No. Slot between word i-1 and word i:
    // We add slot after each word except the last
    const wEl=document.createElement('span');
    wEl.className='word';
    wEl.textContent=word;
    wrap.appendChild(wEl);
    if(i<q.w.length-1){
      const slot=document.createElement('button');
      slot.className='slot';
      slot.dataset.idx=i;
      slot.setAttribute('aria-label','comma slot after '+word);
      const inner=document.createElement('span');
      inner.className='slot-inner';
      inner.textContent=',';
      slot.appendChild(inner);
      slot.addEventListener('click',toggleSlot);
      slot.addEventListener('touchend',e=>{e.preventDefault();toggleSlot.call(slot,e);});
      wrap.appendChild(slot);
    }
  });
}

function toggleSlot(){
  if(answered)return;
  this.classList.toggle('filled');
}

function checkOrNext(){
  if(inNextMode){advanceGame();return;}
  doCheck();
}

function doCheck(){
  const q=questions[cur];
  answered=true;

  // Gather which slots are filled
  const filled=[];
  document.querySelectorAll('.slot.filled').forEach(s=>filled.push(parseInt(s.dataset.idx)));

  // Compare
  const required=[...q.c].sort((a,b)=>a-b);
  const placed=filled.sort((a,b)=>a-b);
  const isCorrect=JSON.stringify(required)===JSON.stringify(placed);

  if(isCorrect){
    correct++;
    changeChameleonColor();
    const praise=['Great job! &#127822;','You got it! &#127881;','Perfect! &#11088;','Brilliant! &#129422;','Spot on! &#127808;','Nailed it! &#10024;'];
    document.getElementById('feedback').innerHTML=praise[0|Math.random()*praise.length];
    document.getElementById('feedback').className='feedback correct';
    // Flash words green
    document.querySelectorAll('.word').forEach(w=>{
      w.classList.add('flash-correct');
      setTimeout(()=>w.classList.remove('flash-correct'),400);
    });
    // Mark correct slots
    document.querySelectorAll('.slot.filled').forEach(s=>s.classList.add('reveal-correct'));
  } else {
    wrong++;
    const tries=['Not quite — here is where it goes! &#128190;','Close! Here is the correct spot &#128190;','Almost! The comma belongs here &#128190;'];
    document.getElementById('feedback').innerHTML=tries[0|Math.random()*tries.length];
    document.getElementById('feedback').className='feedback wrong';
    // Mark filled slots as wrong, show correct positions
    document.querySelectorAll('.slot.filled').forEach(s=>{
      if(!required.includes(parseInt(s.dataset.idx))){
        s.classList.add('reveal-wrong');s.classList.remove('filled');
      }
    });
    // Show where commas should have been
    required.forEach(idx=>{
      const slot=document.querySelector(`.slot[data-idx="${idx}"]`);
      if(slot&&!slot.classList.contains('filled')){
        slot.classList.add('should-have');
      }
    });
    // Disable all slots
    document.querySelectorAll('.slot').forEach(s=>s.style.pointerEvents='none');
  }

  updateSB();
  // Switch button to Next
  const btn=document.getElementById('checkBtn');
  btn.textContent=cur<GS-1?'Next Sentence \u2192':'See My Score! \uD83C\uDFC6';
  btn.className='check-btn next-mode';
  inNextMode=true;
}

function advanceGame(){
  cur++;
  if(cur>=GS){showCelebration();}
  else{renderQ();}
}

function showCelebration(){
  document.getElementById('finalScore').textContent=correct;
  const ov=document.getElementById('celebration');
  if(correct>=RIBBON){
    document.getElementById('celebEmoji').textContent='\uD83C\uDFC6';
    document.getElementById('celebTitle').textContent='Blue Ribbon!';
    document.getElementById('celebMsg').textContent=correct+' out of 20 — your comma game is incredible! You\'re a punctuation champion! &#129422;';
    document.getElementById('ribbonWrap').classList.add('show');
    launchConfetti();
  } else if(correct>=14){
    document.getElementById('celebEmoji').textContent='\uD83C\uDF1F';
    document.getElementById('celebTitle').textContent='Great Work!';
    document.getElementById('celebMsg').textContent=correct+' out of 20 — you\'re getting really good! Try again to earn your blue ribbon!';
    document.getElementById('ribbonWrap').classList.remove('show');
    launchConfetti();
  } else {
    document.getElementById('celebEmoji').textContent='\uD83E\uDD8E';
    document.getElementById('celebTitle').textContent='Keep Going!';
    document.getElementById('celebMsg').textContent=correct+' out of 20. Every chameleon keeps practicing — try again!';
    document.getElementById('ribbonWrap').classList.remove('show');
  }
  ov.classList.add('show');
}

function launchConfetti(){
  const colors=['#f5c842','#ff6b6b','#4ecb8d','#5bb8f5','#a855f7','#ff9f43','#4caf50'];
  for(let i=0;i<70;i++)setTimeout(()=>{
    const el=document.createElement('div');el.className='cf-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[0|Math.random()*colors.length];
    el.style.width=(Math.random()*8+6)+'px';el.style.height=(Math.random()*8+6)+'px';
    el.style.animationDuration=(Math.random()*2+2)+'s';
    el.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(el);setTimeout(()=>el.remove(),4500);
  },i*55);
}

function restartGame(){
  document.getElementById('celebration').classList.remove('show');
  document.getElementById('ribbonWrap').classList.remove('show');
  startGame();
}

    s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';
    s.style.animationDuration=(Math.random()*3+2)+'s';s.style.animationDelay=(Math.random()*4)+'s';
    c.appendChild(s);
  }
})();

startGame();
